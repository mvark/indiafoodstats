name: Fetch OFF India Products (HF)

on:
  workflow_dispatch:

  schedule:
    - cron: '30 2 * * 6'   # Every Saturday 02:30 UTC

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:

    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install packages
      run: |
        pip install duckdb pandas pyarrow fsspec huggingface_hub

    - name: Fetch India products from Hugging Face
      run: |
        python << 'EOF'

        import duckdb
        import pandas as pd
        from pathlib import Path
        from datetime import date

        output_dir = Path("data")
        output_dir.mkdir(exist_ok=True)

        today = date.today().isoformat()

        outfile = output_dir / f"all_{today}.csv"
        latest = output_dir / "all_latest.csv"

        con = duckdb.connect()

        print("Downloading/filtering Open Food Facts...")

        query = """
        SELECT

            code,
            url,
            creator,
            created_datetime,
            last_modified_datetime,
            product_name,
            abbreviated_product_name,
            quantity,
            packaging,
            brands,
            brands_tags,
            categories,
            categories_tags,
            categories_en,
            countries,
            countries_tags,
            countries_en,
            ingredients_text,
            allergens_en,
            serving_size,
            additives_n,
            additives_tags,
            additives_en,
            nutriscore_grade,
            nova_group,
            pnns_groups_1,
            pnns_groups_2,
            food_groups_en,
            brand_owner,
            unique_scans_n,
            completeness,
            last_image_datetime,

            image_url,
            image_small_url,
            image_ingredients_url,
            image_nutrition_url,

            "energy-kcal_100g",
            carbohydrates_100g,
            sugars_100g,
            fiber_100g,
            proteins_100g,
            fat_100g,
            "saturated-fat_100g",
            salt_100g

        FROM read_parquet(
          'hf://datasets/openfoodfacts/product-database/food.parquet'
        )

        WHERE countries_en='India'
        """

        df = con.execute(query).fetch_df()

        print(f"Fetched {len(df):,} India products")

        df.to_csv(outfile, index=False)
        df.to_csv(latest, index=False)

        print("CSV files written.")

        EOF

    - name: Commit changes
      run: |

        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"

        git add data/

        if git diff --cached --quiet; then
          echo "No changes."
          exit 0
        fi

        git commit -m "Fetched India products on $(date +%F)"

    - name: Rebase and Push
      run: |
        git pull --rebase origin main
        git push
