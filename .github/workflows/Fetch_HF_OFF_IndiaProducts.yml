name: Fetch India Products from Hugging Face

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install packages
      run: |
        pip install datasets pandas huggingface_hub

    - name: Fetch India products
      run: |
        python << 'EOF'

        import csv
        from pathlib import Path
        from datetime import date
        from datasets import load_dataset

        print("Loading streaming dataset...")

        ds = load_dataset(
            "openfoodfacts/product-database",
            split="food",
            streaming=True
        )

        outdir = Path("data")
        outdir.mkdir(exist_ok=True)

        today = date.today().isoformat()

        outfile = outdir / f"all_{today}.csv"
        latest = outdir / "all_latest.csv"

        header = [
            "code",
            "product_name",
            "brands",
            "categories",
            "quantity",
            "nova_group",
            "nutriscore_grade",
            "creator",
            "last_modified_t"
        ]

        count = 0

        with open(outfile, "w", newline="", encoding="utf-8") as f:

            writer = csv.writer(f)
            writer.writerow(header)

            for row in ds:

                countries = row.get("countries_tags") or []

                if "en:india" not in countries:
                    continue

                product_name = row.get("product_name")

                if isinstance(product_name, list):
                    product_name = "; ".join(str(x) for x in product_name)

                writer.writerow([
                    row.get("code", ""),
                    product_name,
                    row.get("brands", ""),
                    row.get("categories", ""),
                    row.get("quantity", ""),
                    row.get("nova_group", ""),
                    row.get("nutriscore_grade", ""),
                    row.get("creator", ""),
                    row.get("last_modified_t", "")
                ])

                count += 1

                if count % 500 == 0:
                    print(f"Written {count:,} India products")

        import shutil
        shutil.copy(outfile, latest)

        print(f"Done. {count:,} India products written.")

        EOF

    - name: Commit if changed
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"

        git add data

        if git diff --cached --quiet; then
          echo "No changes"
          exit 0
        fi

        git commit -m "Updated India products $(date +%F)"

    - name: Pull latest
      run: |
        git pull --rebase origin main

    - name: Push
      run: |
        git push
